<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <defs>
    <linearGradient id="vert" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1B5E3F"/>
      <stop offset="100%" style="stop-color:#2E7D5A"/>
    </linearGradient>
    <linearGradient id="terre" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#C4723D"/>
    </linearGradient>
    <linearGradient id="or" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
  </defs>
  <!-- Racines bien visibles (ancrage) -->
  <path d="M 95 88 Q 75 100 68 118 L 72 120 Q 80 105 98 90 Z" fill="url(#vert)"/>
  <path d="M 160 92 L 158 115 L 162 115 Z" fill="url(#vert)"/>
  <path d="M 225 88 Q 245 100 252 118 L 248 120 Q 240 105 222 90 Z" fill="url(#vert)"/>
  <!-- Tronc = barre verticale du + -->
  <rect x="154" y="52" width="12" height="58" rx="2" fill="url(#terre)"/>
  <!-- Barre horizontale du + (branches) -->
  <rect x="118" y="66" width="84" height="12" rx="2" fill="url(#terre)"/>
  <!-- Branches en rÈseau (au-dessus du tronc) -->
  <path d="M 160 52 L 160 28 L 178 20 L 182 38 L 166 34 Z" fill="url(#vert)"/>
  <path d="M 160 52 L 160 28 L 142 20 L 138 38 L 154 34 Z" fill="url(#vert)"/>
  <path d="M 166 34 L 190 28 L 192 42 L 172 40 Z" fill="url(#vert)" opacity="0.9"/>
  <path d="M 154 34 L 130 28 L 128 42 L 148 40 Z" fill="url(#vert)" opacity="0.9"/>
  <!-- Accents dorÈs (mÈmoire, valeur) -->
  <circle cx="180" cy="22" r="3.5" fill="url(#or)"/>
  <circle cx="140" cy="22" r="3.5" fill="url(#or)"/>
  <circle cx="160" cy="14" r="4" fill="url(#or)"/>
  <!-- Nom -->
  <text x="160" y="168" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="26" font-weight="700" fill="#1B5E3F">Racines+</text>
  <!-- Slogan -->
  <text x="160" y="188" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" fill="#B8860B" font-style="italic">l'Histoire continue avec toi.</text>
</svg>
